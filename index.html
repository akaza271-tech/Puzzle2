<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Jigsaw HD</title>
    <style>
        :root { --neon: #00f2ff; --bg: #05070a; --panel: #0f172a; --magic: #ffd700; --win: #39ff14; --error: #ff3131; }
        * { touch-action: manipulation; user-select: none; box-sizing: border-box; }
        body { margin: 0; background: #000; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; }
        
        #gameWrapper { position: relative; width: 360px; height: 640px; background: var(--bg); border: 2px solid #1e293b; border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Start Screen */
        #uploadUI { position: absolute; inset: 0; background: var(--bg); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
        .game-title { font-size: 32px; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 10px; }
        
        .level-group { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-bottom: 20px; }
        .lvl-btn { padding: 12px; border: 1px solid #1e293b; background: #111; color: #64748b; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .lvl-btn.active { border-color: var(--neon); color: var(--neon); background: var(--panel); }

        .btn-ui { width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; border: 1px solid var(--neon); font-size: 14px; text-align: center; }
        #uploadBtn { background: var(--panel); color: var(--neon); }
        #generateBtn { background: var(--neon); color: #000; display: none; margin-top: 10px; border: none; }
        #generateBtn.visible { display: block; }

        /* Board */
        .header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; z-index: 10; }
        #mainArea { 
            width: 330px; height: 385px; margin: 10px auto; 
            display: grid; border: 2px solid #1e293b; position: relative;
            background-color: #0c111d; z-index: 5;
        }
        
        .ghost-guide { position: absolute; inset: 0; opacity: 0.15; z-index: 0; pointer-events: none; background-size: 330px 385px !important; }
        .slot { border: 0.1px solid rgba(255,255,255,0.1); position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; }

        /* FIXED TRAY SYSTEM */
        #selectionArea { 
            position: absolute; bottom: 0; left: 0; width: 100%; height: 180px;
            background: var(--panel); border-top: 2px solid var(--neon); 
            padding: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
            overflow-y: auto; z-index: 100; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Full Tray State */
        #selectionArea.full-tray { height: 100%; padding-top: 60px; }

        .piece { border: 1px solid var(--neon); cursor: pointer; flex-shrink: 0; background-size: 330px 385px !important; transition: transform 0.1s; }
        .piece.selected { border: 2px solid #fff; box-shadow: 0 0 15px var(--neon); transform: scale(1.1); z-index: 101; }
        .piece.placed { width: 100% !important; height: 100% !important; border: none !important; margin: 0 !important; }
        .piece.wrong-spot { border: 2px solid var(--error) !important; box-shadow: inset 0 0 8px var(--error); }

        .btn-magic { background: var(--magic); color: #000; border: none; padding: 6px 12px; border-radius: 6px; font-size: 10px; font-weight: 900; }
        
        /* Fixed Toggle Button */
        #trayToggle { 
            position: sticky; top: -5px; width: 100%; 
            background: var(--neon); color: #000; font-weight: 900; 
            border: none; padding: 12px; border-radius: 6px; 
            margin-bottom: 15px; z-index: 110; cursor: pointer;
        }
        
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 600; }
    </style>
</head>
<body>

<div id="gameWrapper">
    <div id="uploadUI">
        <div class="game-title">NEON JIGSAW</div>
        <p style="color:#94a3b8; font-size: 12px; margin-bottom: 20px;">Upload image for generate puzzle</p>
        
        <div class="level-group">
            <button class="lvl-btn" onclick="setLvl(6,6,this)">NOOB (36)</button>
            <button class="lvl-btn active" onclick="setLvl(6,7,this)">MEDIUM (42)</button>
            <button class="lvl-btn" onclick="setLvl(6,9,this)">PRO (54)</button>
        </div>

        <label class="btn-ui" id="uploadBtn" for="fileInput">CHOOSE IMAGE</label>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <button class="btn-ui" id="generateBtn" onclick="startGame()">GENERATE PUZZLE</button>
    </div>

    <div class="header">
        <button id="magicBtn" class="btn-magic" onclick="magicHint()">HINT (3)</button>
        <div id="timer" style="font-family:monospace; font-size: 18px;">00:00</div>
        <button onclick="location.reload()" style="background:none; border:none; color:#475569; font-size:10px; font-weight: bold;">RESET</button>
    </div>
    
    <div id="mainArea"><div class="ghost-guide" id="bgGuide"></div></div>
    <div id="notif" style="text-align:center; font-size:11px; color:var(--neon); padding:5px; font-weight: bold;">STANDBY</div>

    <div id="selectionArea">
        <button id="trayToggle" onclick="toggleTray()">EXPAND TRAY ↑</button>
    </div>

    <div id="winOverlay" style="display:none" class="overlay">
        <h1 style="color:var(--win)">MISSION COMPLETE</h1>
        <button class="btn-ui" style="width:200px; background:var(--neon); color:#000" onclick="location.reload()">PLAY AGAIN</button>
    </div>
</div>

<script>
    let selectedPiece = null, cols = 6, rows = 7, total = 42;
    let boardState = [], seconds = 0, timer, magicLeft = 3;
    let hdImg = ""; 

    function setLvl(c, r, btn) {
        cols = c; rows = r; total = c * r;
        document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            hdImg = event.target.result; // Original quality
            document.getElementById('generateBtn').classList.add('visible');
            document.getElementById('uploadBtn').innerText = "IMAGE READY ✓";
        };
        reader.readAsDataURL(file);
    };

    function startGame() {
        document.getElementById('uploadUI').style.display = 'none';
        const main = document.getElementById('mainArea');
        const guide = document.getElementById('bgGuide');
        
        guide.style.backgroundImage = `url('${hdImg}')`;
        main.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        main.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
        boardState = Array(total).fill(null);
        
        const pW = 330 / cols; const pH = 385 / rows;

        for(let i=0; i < total; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot'; slot.dataset.idx = i;
            slot.onclick = () => {
                if (!selectedPiece || boardState[i] !== null) return;
                const p = selectedPiece;
                p.classList.remove('selected');
                p.classList.add('placed');
                p.classList.toggle('wrong-spot', parseInt(p.dataset.correct) !== i);
                slot.appendChild(p);
                boardState[i] = parseInt(p.dataset.correct);
                selectedPiece = null;
                checkWin();
            };
            main.appendChild(slot);
        }

        const tray = document.getElementById('selectionArea');
        for (let i = 0; i < total; i++) {
            const p = document.createElement('div');
            p.className = 'piece'; p.id = 'p-' + i;
            p.dataset.correct = i;
            p.style.width = (pW * 0.85) + 'px'; 
            p.style.height = (pH * 0.85) + 'px';
            p.style.backgroundImage = `url('${hdImg}')`;
            p.style.backgroundPosition = `-${(i % cols) * pW}px -${Math.floor(i / cols) * pH}px`;
            
            p.onclick = (e) => {
                e.stopPropagation();
                if(p.classList.contains('placed')) {
                    boardState[p.parentElement.dataset.idx] = null;
                    p.classList.remove('placed', 'wrong-spot');
                    tray.appendChild(p);
                    checkWin();
                } else {
                    if (selectedPiece) selectedPiece.classList.remove('selected');
                    selectedPiece = p; p.classList.add('selected');
                    // auto-close tray for better visibility
                    tray.classList.remove('full-tray');
                    document.getElementById('trayToggle').innerText = "EXPAND TRAY ↑";
                }
            };
            tray.appendChild(p);
        }
        
        shuffleTray();

        timer = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = m + ":" + s;
        }, 1000);
    }

    function magicHint() {
        if (magicLeft <= 0) return;
        let tIdx = boardState.findIndex((v, i) => v !== i);
        if(tIdx !== -1) {
            const tPiece = document.getElementById('p-' + tIdx);
            if(tPiece.parentElement.classList.contains('slot')) {
                boardState[tPiece.parentElement.dataset.idx] = null;
            }
            selectedPiece = tPiece;
            const targetSlot = document.querySelectorAll('.slot')[tIdx];
            targetSlot.click();
            magicLeft--;
            document.getElementById('magicBtn').innerText = "HINT (" + magicLeft + ")";
        }
    }

    function checkWin() {
        const placed = boardState.filter(v => v !== null).length;
        const allCorrect = boardState.every((v, i) => v === i);
        document.getElementById('notif').innerText = "PROGRESS: " + placed + " / " + total;
        if (placed === total && allCorrect) {
            clearInterval(timer);
            document.getElementById('bgGuide').style.opacity = "1";
            setTimeout(() => document.getElementById('winOverlay').style.display = 'flex', 600);
        }
    }

    function toggleTray() {
        const tray = document.getElementById('selectionArea');
        tray.classList.toggle('full-tray');
        document.getElementById('trayToggle').innerText = tray.classList.contains('full-tray') ? "CLOSE TRAY ↓" : "EXPAND TRAY ↑";
    }

    function shuffleTray() {
        const tray = document.getElementById('selectionArea');
        for (let i = tray.children.length; i >= 1; i--) {
            const child = tray.children[Math.random() * i | 0];
            if(child.id !== 'trayToggle') tray.appendChild(child);
        }
    }
</script>
</body>
</html>
